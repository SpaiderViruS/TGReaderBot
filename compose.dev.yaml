services:
  postgres:
    image: postgres:16
    container_name: db_messages_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
#       - pg_data:/var/lib/postgresql/data
